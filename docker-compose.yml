services:
  bridge:
    build:
      context: .
      dockerfile: packages/openclaw-beav3r-bridge/Dockerfile
    environment:
      BEAV3R_URL: ${BEAV3R_URL}
      BEAV3R_API_KEY: ${BEAV3R_API_KEY}
      OPENCLAW_LOG_LEVEL: ${OPENCLAW_LOG_LEVEL:-info}
      BRIDGE_LOG_LEVEL: ${BRIDGE_LOG_LEVEL:-}
      BEAV3R_ORIGIN_LABEL: ${BEAV3R_ORIGIN_LABEL:-}
      BEAV3R_ORIGIN_TYPE: ${BEAV3R_ORIGIN_TYPE:-openclaw}
      BRIDGE_HOST: ${BRIDGE_HOST:-0.0.0.0}
      BRIDGE_PORT: ${BRIDGE_PORT:-7772}
      BEAV3R_TIMEOUT_MS: ${BEAV3R_TIMEOUT_MS:-3000}
      BRIDGE_POLL_MS: ${BRIDGE_POLL_MS:-1500}
      CALLBACK_SECRET: ${CALLBACK_SECRET}
      CALLBACK_RETRIES: ${CALLBACK_RETRIES:-2}
      CALLBACK_BACKOFF_MS: ${CALLBACK_BACKOFF_MS:-100}
      PENDING_TIMEOUT_SEC: ${PENDING_TIMEOUT_SEC:-300}
      EXPIRE_SKEW_SEC: ${EXPIRE_SKEW_SEC:-0}
      RISK_LOCAL_MAX: ${RISK_LOCAL_MAX:-30}
      RISK_BEAV3R_MIN: ${RISK_BEAV3R_MIN:-70}
      FALLBACK_MEDIUM: ${FALLBACK_MEDIUM:-local}
      FALLBACK_HIGH: ${FALLBACK_HIGH:-deny}
    ports:
      - "${BRIDGE_PORT:-7772}:7772"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:7772/health"]
      interval: 10s
      timeout: 3s
      retries: 6

  plugin:
    build:
      context: .
      dockerfile: packages/openclaw-approvals/Dockerfile
    depends_on:
      bridge:
        condition: service_healthy
    environment:
      BEAV3R_URL: ${BEAV3R_URL}
      BEAV3R_API_KEY: ${BEAV3R_API_KEY}
      OPENCLAW_LOG_LEVEL: ${OPENCLAW_LOG_LEVEL:-info}
      PLUGIN_LOG_LEVEL: ${PLUGIN_LOG_LEVEL:-}
      OPENCLAW_GATEWAY_URL: ${OPENCLAW_GATEWAY_URL:-ws://host.docker.internal:18789}
      OPENCLAW_STATE_DIR: ${OPENCLAW_STATE_DIR:-/openclaw-state}
      BRIDGE_URL: ${BRIDGE_URL:-http://bridge:7772}
      CALLBACK_SECRET: ${CALLBACK_SECRET}
      CALLBACK_KEY_ID: ${CALLBACK_KEY_ID:-k1}
      PLUGIN_HOST: ${PLUGIN_HOST:-0.0.0.0}
      PLUGIN_PORT: ${PLUGIN_PORT:-7771}
      PLUGIN_PUBLIC_URL: ${PLUGIN_PUBLIC_URL:-http://plugin:7771}
      BEAV3R_TIMEOUT_MS: ${BEAV3R_TIMEOUT_MS:-3000}
      RISK_LOCAL_MAX: ${RISK_LOCAL_MAX:-30}
      RISK_BEAV3R_MIN: ${RISK_BEAV3R_MIN:-70}
      FALLBACK_MEDIUM: ${FALLBACK_MEDIUM:-local}
      FALLBACK_HIGH: ${FALLBACK_HIGH:-deny}
    ports:
      - "${PLUGIN_PORT:-7771}:7771"
    volumes:
      - "${OPENCLAW_STATE_HOST_PATH:-$HOME/.openclaw}:${OPENCLAW_STATE_DIR:-/openclaw-state}:ro"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:7771/health"]
      interval: 10s
      timeout: 3s
      retries: 6
