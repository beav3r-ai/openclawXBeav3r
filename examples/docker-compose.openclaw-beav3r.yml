services:
  bridge:
    build:
      context: ..
      dockerfile: packages/openclaw-beav3r-bridge/Dockerfile
    environment:
      BEAV3R_URL: ${BEAV3R_URL}
      BEAV3R_API_KEY: ${BEAV3R_API_KEY}
      BRIDGE_HOST: 0.0.0.0
      BRIDGE_PORT: 7772
      CALLBACK_SECRET: ${CALLBACK_SECRET}
      BRIDGE_POLL_MS: 1500
    ports:
      - "7772:7772"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  plugin:
    build:
      context: ..
      dockerfile: packages/openclaw-approvals/Dockerfile
    depends_on:
      bridge:
        condition: service_started
    environment:
      BEAV3R_URL: ${BEAV3R_URL}
      BEAV3R_API_KEY: ${BEAV3R_API_KEY}
      OPENCLAW_GATEWAY_URL: ${OPENCLAW_GATEWAY_URL:-ws://host.docker.internal:18789}
      BRIDGE_URL: http://bridge:7772
      CALLBACK_SECRET: ${CALLBACK_SECRET}
      PLUGIN_HOST: 0.0.0.0
      PLUGIN_PORT: 7771
      PLUGIN_PUBLIC_URL: ${PLUGIN_PUBLIC_URL:-http://127.0.0.1:7771}
    ports:
      - "7771:7771"
    extra_hosts:
      - "host.docker.internal:host-gateway"
